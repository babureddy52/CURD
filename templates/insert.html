<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body bgcolor="skyblue">
     <form action="{% url 'insert' %}" method="post">
       {% csrf_token %}
       <table align="center" bgcolor="color:orange;">
         <tr>
           <th>Eid</th>
           <th><input type="number" name="eid"></th>
         </tr>
         <tr>
           <th>Ename</th>
           <th><input type="text" name="ename"></th>
         </tr>
         <tr>
           <th>Phno</th>
           <th><input type="number" name="Phno"></th>
         </tr>
         <tr>
           <th>Salary</th>
           <th><input type="number" name="sal"></th>
         </tr>
         <tr>
           <th colspan="2"> <input type="submit" value="insert"></th>
         </tr>
       </table>
     </form>
</body>
</html>
