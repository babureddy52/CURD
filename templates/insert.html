<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Registration</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        form{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        table{
            border-collapse:collapse;
        }

        th{
            padding:12px;
            font-size:18px;
            color:#333;
            text-align:left;
        }

        input[type="text"],
        input[type="number"]{
            width:250px;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        input[type="text"]:focus,
        input[type="number"]:focus{
            outline:none;
            border-color:#4CAF50;
            box-shadow:0 0 5px rgba(76,175,80,0.5);
        }

        input[type="submit"]{
            width:100%;
            padding:12px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        input[type="submit"]:hover{
            background:#45a049;
        }

        h2{
            text-align:center;
            color:#333;
            margin-bottom:20px;
        }
    </style>
</head>
<body>

<form action="{% url 'insert' %}" method="post">
    {% csrf_token %}

    <h2>Employee Registration</h2>

    <table>
        <tr>
            <th>Eid</th>
            <td><input type="number" name="eid"></td>
        </tr>
        <tr>
            <th>Ename</th>
            <td><input type="text" name="ename"></td>
        </tr>
        <tr>
            <th>Phno</th>
            <td><input type="number" name="Phno"></td>
        </tr>
        <tr>
            <th>Salary</th>
            <td><input type="number" name="sal"></td>
        </tr>
        <tr>
            <td colspan="2">
                <input type="submit" value="Insert Employee">
            </td>
        </tr>
    </table>
</form>

</body>
</html>
